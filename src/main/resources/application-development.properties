# JDBC (MANDATORY)
jakarta.persistence.jdbc.url=jdbc:mysql://localhost:3306/eduverse_db?serverTimezone=UTC
jakarta.persistence.jdbc.student=root
jakarta.persistence.jdbc.password=12345678
jakarta.persistence.jdbc.driver=com.mysql.cj.jdbc.Driver

# Hibernate (MANDATORY in SB4)
hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.hbm2ddl.auto=update
hibernate.show_sql=true
hibernate.format_sql=true

spring.datasource.url=jdbc:mysql://localhost:3306/eduverse
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
